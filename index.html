<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Gaming World</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #050505;
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: black;
}
.logo { color: cyan; font-size: 22px; }

/* HERO */
.hero {
    text-align: center;
    padding: 80px;
}
.hero h1 { color: cyan; }

/* GAMES GRID */
.games {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #111;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px cyan;
}

.card img { width: 100%; }

.buttons {
    display: flex;
    gap: 10px;
    padding: 10px;
}

.play {
    background: green;
    flex: 1;
    padding: 10px;
    border: none;
    color: white;
}

.app {
    background: black;
    border: 1px solid white;
    flex: 1;
    padding: 10px;
    color: white;
}

/* CONTACT */
.contact {
    text-align: center;
    padding: 40px;
}
input, textarea {
    width: 80%;
    margin: 10px;
    padding: 10px;
    background: #222;
    border: none;
    color: white;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    background: black;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">🎮 Gaming World</div>
    <div>Home Games Contact</div>
</div>

<div class="hero">
    <h1>Welcome Gamer 🔥</h1>
    <p>All Games In One Place</p>
</div>

<div class="games">

<!-- BGMI -->
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/en/7/7e/BGMI.jpg">
<h3>BGMI</h3>
<div class="buttons">
<button class="play" onclick="go('https://play.google.com/store/apps/details?id=com.pubg.imobile')">Play Store</button>
<button class="app" onclick="go('https://apps.apple.com')">App Store</button>
</div>
</div>

<!-- Free Fire -->
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/en/9/9c/Garena_Free_Fire_logo.jpg">
<h3>Free Fire</h3>
<div class="buttons">
<button class="play" onclick="go('https://play.google.com/store/apps/details?id=com.dts.freefireth')">Play Store</button>
<button class="app" onclick="go('https://apps.apple.com')">App Store</button>
</div>
</div>

<!-- COD -->
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/en/5/5e/Call_of_Duty_Mobile.jpg">
<h3>Call of Duty</h3>
<div class="buttons">
<button class="play" onclick="go('https://play.google.com/store/apps/details?id=com.activision.callofduty.shooter')">Play Store</button>
<button class="app" onclick="go('https://apps.apple.com')">App Store</button>
</div>
</div>

<!-- PUBG -->
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/en/0/0f/PUBG_Mobile_logo.jpg">
<h3>PUBG Mobile</h3>
<div class="buttons">
<button class="play" onclick="go('https://play.google.com/store/apps/details?id=com.tencent.ig')">Play Store</button>
<button class="app" onclick="go('https://apps.apple.com')">App Store</button>
</div>
</div>

</div>

<div class="contact">
<h2>Contact Us</h2>
<input placeholder="Name"><br>
<input placeholder="Email"><br>
<textarea placeholder="Message"></textarea><br>
<button onclick="send()">Send</button>
</div>

<div class="footer">
<p>© 2026 Gaming World</p>
</div>

<script>
function go(link) {
    window.location.href = link;
}

function send() {
    alert("Message sent 🚀");
}
</script>

</body>
</html>
